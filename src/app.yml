# Databricks App Configuration
# ============================
# This file configures the app runtime settings
# Environment-specific values (job IDs, Lakebase, etc.) are injected during CI/CD deployment

command: ["gunicorn", "--bind", "0.0.0.0:$DATABRICKS_APP_PORT", "--workers", "2", "--timeout", "300", "wsgi:app"]

env:
  - name: SQL_WAREHOUSE_ID
    value: "ffb56411b8946b4e"                      # Set in Databricks App UI → Environment variables
  - name: DQ_GENERATION_JOB_ID
    value: "841968996433607"   #"mas-7a439e1c-endpoint"                      # Your supervisor agent endpoint name
  - name: DQ_VALIDATION_JOB_ID
    value: "71777656292289"                      # OAuth public client ID from Account Console
